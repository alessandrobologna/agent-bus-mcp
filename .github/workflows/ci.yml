name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run full Python version matrix (3.12–3.14)"
        required: false
        type: boolean
        default: false

env:
  ORT_VERSION: "1.23.2"
  NODE_VERSION: "24"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Sync deps
        run: uv sync --dev

      - name: Build extension
        run: uv run maturin develop

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Frontend unit tests
        run: pnpm --dir frontend test

      - name: Frontend build
        run: pnpm --dir frontend build

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Frontend e2e smoke
        run: pnpm --dir frontend test:e2e

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
        python-version: ${{ fromJson((github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true') && '["3.12","3.13","3.14"]' || '["3.14"]') }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP/onnxruntime-win-x64-$env:ORT_VERSION.zip"
          $dir = "$env:RUNNER_TEMP/onnxruntime-win-x64-$env:ORT_VERSION"
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/onnxruntime-win-x64-$env:ORT_VERSION.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP
          "ORT_LIB_LOCATION=$dir\\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ORT_PREFER_DYNAMIC_LINK=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PATH=$dir\\lib;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sync deps
        run: uv sync --dev

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend bundle
        run: pnpm --dir frontend build

      - name: Build wheel
        run: uv run maturin build --release -o dist

      - name: Install wheel
        shell: bash
        run: uv pip install --force-reinstall dist/*.whl

      - name: Run tests
        run: uv run pytest

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Ty type check
        run: uv run ty check

  wheels:
    uses: ./.github/workflows/build-wheels.yml
    with:
      upload_artifacts: false
