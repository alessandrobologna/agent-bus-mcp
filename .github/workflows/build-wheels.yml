name: build-wheels

on:
  workflow_call:
    inputs:
      upload_artifacts:
        type: boolean
        default: true
      use_pypi_readme:
        type: boolean
        default: false
      pypi_readme_artifact_name:
        type: string
        default: pypi-readme
      version_override_python:
        type: string
        default: ""
      version_override_cargo:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      upload_artifacts:
        type: boolean
        default: true
      use_pypi_readme:
        type: boolean
        default: false
      pypi_readme_artifact_name:
        type: string
        default: pypi-readme
      version_override_python:
        type: string
        default: ""
      version_override_cargo:
        type: string
        default: ""

env:
  ORT_VERSION: "1.23.2"
  NODE_VERSION: "24"

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply workflow version overrides
        if: inputs.version_override_python != '' || inputs.version_override_cargo != ''
        shell: bash
        env:
          PY_VERSION: ${{ inputs.version_override_python }}
          CARGO_VERSION: ${{ inputs.version_override_cargo }}
        run: |
          set -euo pipefail
          python .github/scripts/apply_version_overrides.py "$PY_VERSION" "$CARGO_VERSION"

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download PyPI README artifacts
        if: inputs.use_pypi_readme
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.pypi_readme_artifact_name }}
          path: .

      - name: Use PyPI README for package metadata
        if: inputs.use_pypi_readme
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          updated = text.replace('readme = "README.md"', 'readme = "README.pypi.md"')
          if updated == text:
            raise SystemExit('Expected to find \'readme = "README.md"\' in pyproject.toml')
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Validate version configuration
        env:
          EXPECTED_PY_VERSION: ${{ inputs.version_override_python }}
          EXPECTED_CARGO_VERSION: ${{ inputs.version_override_cargo }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as fh:
            pyproject = tomllib.load(fh)
          with open("Cargo.toml", "rb") as fh:
            cargo = tomllib.load(fh)

          py_version = pyproject["project"]["version"]
          cargo_version = cargo["package"]["version"]

          expected_py = os.environ["EXPECTED_PY_VERSION"].strip()
          expected_cargo = os.environ["EXPECTED_CARGO_VERSION"].strip()

          if expected_py or expected_cargo:
            if not expected_py or not expected_cargo:
              raise SystemExit("Expected both version overrides to be provided together")
            if py_version != expected_py:
              raise SystemExit(
                f"pyproject.toml version mismatch: expected {expected_py}, got {py_version}"
              )
            if cargo_version != expected_cargo:
              raise SystemExit(
                f"Cargo.toml version mismatch: expected {expected_cargo}, got {cargo_version}"
              )
            print(f"Version overrides OK: pyproject.toml={py_version} Cargo.toml={cargo_version}")
          else:
            if py_version != cargo_version:
              raise SystemExit(
                f"Version mismatch: pyproject.toml={py_version} Cargo.toml={cargo_version}"
              )
            print(f"Version OK: {py_version}")
          PY

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend bundle
        run: pnpm --dir frontend build

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply workflow version overrides
        if: inputs.version_override_python != '' || inputs.version_override_cargo != ''
        shell: bash
        env:
          PY_VERSION: ${{ inputs.version_override_python }}
          CARGO_VERSION: ${{ inputs.version_override_cargo }}
        run: |
          set -euo pipefail
          python .github/scripts/apply_version_overrides.py "$PY_VERSION" "$CARGO_VERSION"

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download PyPI README artifacts
        if: inputs.use_pypi_readme
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.pypi_readme_artifact_name }}
          path: .

      - name: Use PyPI README for package metadata
        if: inputs.use_pypi_readme
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          updated = text.replace('readme = "README.md"', 'readme = "README.pypi.md"')
          if updated == text:
            raise SystemExit('Expected to find \'readme = "README.md"\' in pyproject.toml')
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend bundle
        run: pnpm --dir frontend build

      - name: Download ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP/onnxruntime-win-x64-$env:ORT_VERSION.zip"
          $dir = "$env:RUNNER_TEMP/onnxruntime-win-x64-$env:ORT_VERSION"
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/onnxruntime-win-x64-$env:ORT_VERSION.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP
          "ORT_LIB_LOCATION=$dir\\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ORT_PREFER_DYNAMIC_LINK=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PATH=$dir\\lib;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build wheels (Linux, manylinux_2_28)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # manylinux builds run in a container, so pin the interpreter here.
          args: --release --out dist -i python3.12
          manylinux: 2_28

      - name: Build wheels (Linux, manylinux_2_28 aarch64)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -i python3.12
          manylinux: 2_28
          target: aarch64-unknown-linux-gnu

      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      - name: Upload wheels
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ runner.os }}
          path: dist/*.whl
          if-no-files-found: error
