      stroke: #e4e9ff;
      stroke-width: 1.1;
    }

    .token-core {
      fill: #f1f4ff;
      opacity: 0.84;
    }

    .halo {
      fill: none;
      stroke: #9fb0ff;
      stroke-width: 1.35;
      opacity: 0;
    }

    .motion-reduced {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
